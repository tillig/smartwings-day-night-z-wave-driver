# CI workflow: lint and validate the SmartThings Edge driver on every push/PR.
#
# No secrets required. `smartthings edge:drivers:package --build-only` validates
# config.yml / profiles / fingerprints and produces the driver zip without any
# authentication, so the full pipeline runs for anyone (including forks/PRs).
#
# Releasing (uploading to a channel) is intentionally NOT done in CI — SmartThings
# has no long-lived API token (PATs expire in 24h), so releases are a local step.
# See setup/Release-Driver.ps1 and CONTRIBUTING.md.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lua lint + syntax check ────────────────────────────────────────────────
  lua-lint:
    name: Lua lint (luacheck + luac)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install Lua 5.3 + LuaRocks via the standard marketplace actions.
      - uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.3"

      - uses: leafo/gh-actions-luarocks@v4

      - name: Install luacheck
        run: luarocks install luacheck

      - name: luac syntax check
        run: |
          find driver/src -name "*.lua" -print0 \
            | xargs -0 -I{} luac -p {}

      - name: luacheck
        run: luacheck --config .luacheckrc driver/src/

  # ── pre-commit (JSON / YAML / Markdown / trailing-whitespace) ─────────────
  pre-commit:
    name: pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit on all files
        # --all-files runs every hook against every file.  Hooks that auto-fix
        # (markdownlint --fix, json-sort --autofix) will modify files and then
        # pre-commit exits non-zero, causing CI to fail — exactly the right
        # behaviour: "files need formatting, please run pre-commit locally."
        #
        # The local luacheck/luac hooks require system binaries that are not
        # available in this job, so we skip them here (they run in lua-lint).
        run: SKIP=luacheck,luac-syntax-check pre-commit run --all-files

  # ── SmartThings driver package validation ─────────────────────────────────
  package:
    name: Driver package (smartthings edge:drivers:package)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install SmartThings CLI
        run: npm install -g @smartthings/cli

      # --build-only packages the driver zip locally WITHOUT uploading and
      # WITHOUT any authentication, while still validating config.yml, profiles,
      # and fingerprints — so it catches schema errors on every push/PR.
      - name: Package driver (build only)
        run: |
          mkdir -p build
          smartthings edge:drivers:package driver --build-only build/driver.zip

      - name: Upload driver zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: driver-zip
          path: build/driver.zip
          retention-days: 7
