# CI workflow: lint and validate the SmartThings Edge driver on every push/PR.
#
# No secrets required. `smartthings edge:drivers:package --build-only` validates
# config.yml / profiles / fingerprints and produces the driver zip without any
# authentication, so the full pipeline runs for anyone (including forks/PRs).
#
# Releasing (uploading to a channel) is intentionally NOT done in CI — SmartThings
# has no long-lived API token (PATs expire in 24h), so releases are a local step.
# See setup/Update.ps1 and CONTRIBUTING.md.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # All linting (including Lua) runs through pre-commit so the hooks are the
  # single source of truth — the same checks run locally and in CI.
  pre-commit:
    name: pre-commit (lint + Lua)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Lua + luacheck so the luac-syntax-check and luacheck hooks can run.
      - uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.3"
      - uses: leafo/gh-actions-luarocks@v4
      - name: Install luacheck
        run: luarocks install luacheck

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install pre-commit
        run: pip install pre-commit

      # Run every hook against every file. Auto-fixing hooks (markdownlint,
      # json-sort) modify files and exit non-zero if anything changed — i.e. CI
      # fails with "run pre-commit locally," which is the desired behaviour.
      - name: Run pre-commit
        run: pre-commit run --all-files

  package:
    name: Driver package (build only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install SmartThings CLI
        run: npm install -g @smartthings/cli

      # --build-only packages the driver zip locally WITHOUT uploading and
      # WITHOUT any authentication, while still validating config.yml, profiles,
      # and fingerprints — so it catches schema errors on every push/PR.
      - name: Package driver (build only)
        run: |
          mkdir -p build
          smartthings edge:drivers:package driver --build-only build/driver.zip

      - name: Upload driver zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: driver-zip
          path: build/driver.zip
          retention-days: 7
