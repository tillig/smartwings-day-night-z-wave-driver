# CI workflow: lint and validate the SmartThings Edge driver on every push/PR.
#
# Required GitHub secret (optional — package validation is skipped when absent):
#   SMARTTHINGS_TOKEN  — a SmartThings Personal Access Token (PAT) with at least
#                        the "r:devices,r:installedapps" scope. Generate one at:
#                        https://account.smartthings.com/tokens
#                        Without this secret the Lua lint + syntax check jobs
#                        still run; only the driver package step is skipped.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lua lint + syntax check ────────────────────────────────────────────────
  lua-lint:
    name: Lua lint (luacheck + luac)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install Lua 5.3 + LuaRocks via the standard marketplace actions.
      - uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.3"

      - uses: leafo/gh-actions-luarocks@v4

      - name: Install luacheck
        run: luarocks install luacheck

      - name: luac syntax check
        run: |
          find driver/src -name "*.lua" -print0 \
            | xargs -0 -I{} luac -p {}

      - name: luacheck
        run: luacheck --config .luacheckrc driver/src/

  # ── pre-commit (JSON / YAML / Markdown / trailing-whitespace) ─────────────
  pre-commit:
    name: pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit on all files
        # --all-files runs every hook against every file.  Hooks that auto-fix
        # (markdownlint --fix, json-sort --autofix) will modify files and then
        # pre-commit exits non-zero, causing CI to fail — exactly the right
        # behaviour: "files need formatting, please run pre-commit locally."
        #
        # The local luacheck/luac hooks require system binaries that are not
        # available in this job, so we skip them here (they run in lua-lint).
        run: SKIP=luacheck,luac-syntax-check pre-commit run --all-files

  # ── SmartThings driver package validation ─────────────────────────────────
  package:
    name: Driver package (smartthings edge:drivers:package)
    runs-on: ubuntu-latest
    # Skip this job entirely when the token secret is not configured.
    # Contributors without a PAT will still get lint + pre-commit feedback.
    if: ${{ secrets.SMARTTHINGS_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install SmartThings CLI
        run: npm install -g @smartthings/cli

      # The --build-only flag packages the driver zip locally without uploading
      # it.  Even with --build-only the CLI validates config.yml, profiles, and
      # fingerprints, so it catches schema errors.
      #
      # NOTE: as of SmartThings CLI v3+ --build-only still requires a valid
      # token to initialise the SDK config subsystem.  The token is passed via
      # the SMARTTHINGS_TOKEN environment variable which the CLI reads
      # automatically when present.
      - name: Package driver (build only)
        env:
          SMARTTHINGS_TOKEN: ${{ secrets.SMARTTHINGS_TOKEN }}
        run: |
          mkdir -p build
          smartthings edge:drivers:package driver --build-only build/driver.zip

      - name: Upload driver zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: driver-zip
          path: build/driver.zip
          retention-days: 7
