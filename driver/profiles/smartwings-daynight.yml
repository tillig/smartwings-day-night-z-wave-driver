name: smartwings-daynight
components:
  # POLISHED PROFILE for SmartWings day/night dual-motor shades.
  #
  # Coordinate model (confirmed empirically): one vertical scale where
  # value = rail HEIGHT, 0 = window bottom, 100 = window top. Higher = more open.
  #   - BOTTOM rail = Z-Wave endpoint 1 (component "main")
  #   - MIDDLE rail = Z-Wave endpoint 2 (the sheer/middle rail)
  #     Hard rule: middle >= bottom (firmware-enforced too).
  #
  # "main" reads as an ordinary window shade for Google Home / voice:
  #   open  = bottom rail up (see out)      close = bottom rail down (covered)
  # "scene" holds the day/night scene picker + apply button.
  # "favorite" holds the save/recall of a full both-rail position.
  #
  # The MIDDLE rail (sheer) is NOT a component here. It is exposed only via the
  # separate child "Sheer" device (profile smartwings-sheer) so it appears once,
  # controllable in-app and by voice. This avoids showing the sheer twice.
  - id: main
    label: Shade
    capabilities:
      - id: windowShade
        version: 1
      - id: windowShadeLevel
        version: 1
      - id: battery
        version: 1
      - id: refresh
        version: 1
    categories:
      - name: Blind
  - id: scene
    label: Scene
    capabilities:
      - id: happyvessel61954.dayNightScene
        version: 1
    categories:
      - name: Blind
  - id: favorite
    label: Favorite
    capabilities:
      - id: happyvessel61954.dayNightFavorite
        version: 1
    categories:
      - name: Blind
